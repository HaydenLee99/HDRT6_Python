<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>회원가입 — 드론 비행 관리 시스템</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="{{ url_for('static', filename='css/common.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>

<body class="auth-page">

  <a href="/" class="auth-logo">
    <div class="logo-circle"><div class="logo-inner"><div class="logo-dot"></div></div></div>
    <div>
      <span class="logo-text">드론 비행 관리 시스템</span>
      <span class="logo-sub">안전한 드론 비행을 위한 통합 서비스</span>
    </div>
  </a>

  <div class="auth-card reg-card">
    <div class="reg-title">회원가입</div>
    <div class="reg-sub">아래 정보를 입력해 계정을 만들어 주세요</div>

    <form action="/register" method="post" id="register-form">

      <!-- 기본 정보 (필수) -->
      <div class="reg-section">
        <div class="reg-section-title">
          👤 기본 정보
          <span style="font-size:0.65rem; color:var(--text-muted); font-weight:500; letter-spacing:0; text-transform:none;">
            <span class="text-required">*</span> 필수 입력 항목
          </span>
        </div>
        <div class="reg-row">
          <div class="form-group">
            <label>이름 <span class="text-required">*</span></label>
            <input type="text" name="name" placeholder="홍길동" required/>
          </div>
          <div class="form-group">
            <label>생년월일 <span class="text-required">*</span></label>
            <div class="birth-wrap">
              <input type="text" name="birth" id="birth-input"
                     placeholder="YYYY-MM-DD" maxlength="10" required
                     oninput="formatBirth(this)"/>
              <input type="date" id="birth-picker"
                     style="position:absolute; opacity:0; pointer-events:none; width:0; height:0;"/>
              <button type="button" class="btn-cal" onclick="openBirthPicker()" title="달력으로 선택">📅</button>
            </div>
          </div>
        </div>
        <div class="form-group">
          <label>전화번호 <span class="text-required">*</span></label>
          <input type="text" name="phone" placeholder="010-0000-0000" maxlength="13" required oninput="pmFormatPhone(this)"/>
        </div>
        <div class="reg-row">
          <div class="form-group">
            <label>아이디 <span class="text-required">*</span></label>
            <input type="text" name="login_id" placeholder="아이디" required
                   class="{{ 'input-error' if error else '' }}"/>
            {% if error %}
            <div style="color:var(--red);font-size:.72rem;margin-top:3px;">{{ error }}</div>
            {% endif %}
          </div>
          <div class="form-group">
            <label>비밀번호 <span class="text-required">*</span></label>
            <input type="password" name="password" placeholder="비밀번호" required/>
          </div>
        </div>
      </div>

      <!-- 드론 제원 (선택사항) -->
      <div class="reg-section">
        <div class="reg-section-title">
          🚁 드론 제원
          <span class="badge-optional">선택사항</span>
        </div>
        <div class="reg-row">
          <div class="form-group">
            <label>드론 무게 <span class="unit-badge">kg</span></label>
            <input type="text" name="weight" placeholder="예: 1.2"/>
          </div>
          <div class="form-group">
            <label>드론 크기 <span class="unit-badge">cm</span></label>
            <input type="text" name="size" placeholder="예: 35" oninput="formatCm(this)"/>
          </div>
        </div>
        <div class="reg-row">
          <div class="form-group">
            <label>최대 이륙중량 <span class="unit-badge">kg</span></label>
            <input type="text" name="max_takeoff_weight" placeholder="예: 2.0"/>
          </div>
          <div class="form-group">
            <label>드론 종류</label>
            <select name="drone_type">
              <option value="">선택 안함</option>
              <option value="무인멀티콥터">무인멀티콥터</option>
              <option value="무인비행기">무인비행기</option>
            </select>
          </div>
        </div>
      </div>

      <button class="btn-register" type="submit">회원가입 완료</button>
    </form>

    <div class="auth-footer">
      이미 계정이 있으신가요? <a href="/login">로그인</a>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/auth_forms.js') }}"></script>

</body>
</html>
