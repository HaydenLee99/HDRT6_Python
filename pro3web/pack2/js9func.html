<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    arrow function : let 변수 (매개변수1,...) => {표현식}
    <br>
    ✅ 매개변수가 한 개면 소괄호 생략 가능
    <br>
    ✅ return을 써주면 중괄호 필요. 안쓰면 중괄호 빼기
    <hr>
    <script>
        'use strict';
        function sum0(a,b){
            return a+b;
        }
        document.write(sum0(1,3))

        let sum1 = function(a,b){
            return a+b;
        }
        document.write(sum1(1,3))

        let sum2 = (a,b) => {return a + b}
        document.write(sum2(1,3))

        let sum3 = (a,b) => a + b
        document.write(sum3(1,3))

        let double1 = n => n*2;             // argument가 하나면 소괄호 생략 가능
        document.write(double1(3))

        let sayHi = () => document.write("반갑소")  // arg가 0 or 복수면 소괄호 필수
        sayHi();

        let age    = 30;
        let welcome = (age<30)
        ? () => document.write("반갑소")
        : () => document.write("반갑습니다")
        welcome();
        
        document.write("<br>");
        let sumFunc = (a,b) => {
            let result = a+b;
            return result;
        }
        document.write(`5와 6의 합은 ${sumFunc(5,6)} 입니다.<br>`)
        let btn = document.getElementById("btn");

    </script>
</body>
</html>
