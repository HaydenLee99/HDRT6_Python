<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        window.onload = () => {
            document.querySelector('#btnGet').onclick = getFunc;
            document.querySelector('#btnPost').onclick = postFunc;
        }
        let xhr;
        function getFunc(){
            let irum = frm.name.value;
            let nai = frm.age.value;
            xhr = new XMLHttpRequest();         // server와 ajax 통신용 클래스 역할
            let fname = "js16.py?irum="+irum+"&nai="+nai;
            // 임시 방편용 js16.py 작성 (이것은 처리 후 json으로 반환한다 가정)
            xhr.open("GET", fname, true);       // true 비동기 방식 , false 동기 방식
            xhr.onreadystatechange = function(){
                if(xhr.readyState === 4 && xhr.status === 200){
                    process1();
                }
            }
            xhr.send();
        }
        function postFunc(){
            let irum = frm.name.value;
            let nai = frm.age.value;
            xhr = new XMLHttpRequest();         // server와 ajax 통신용 클래스 역할
            let fname = "js16.py";
            // 임시 방편용 js16.py 작성 (이것은 처리 후 json으로 반환한다 가정)
            xhr.open("POST", fname, true);       // true 비동기 방식 , false 동기 방식
            xhr.onreadystatechange = function(){
                if(xhr.readyState === 4 && xhr.status === 200){
                    process1();
                }
            }
            xhr.setRequestHeader("Content-Type", "application/x-www-form-urlencoded");
            xhr.send("?irum=" + irum + "&nai=" + nai);      // body 영역에 포함되어 전송(대용량 전송이 가능하다)
        }
        function process1(){
            alert(xhr.responseText);
        }
    </script>
</head>
<body>
    <h2>Ajax 이해 : get, post</h2>
    <br>●'◡'● Ajax는 비동기 HTTP 통신 ●'◡'●
    <form name="frm">
        이름 : <input type="text" name="name" value="tom"><br>
        나이 : <input type="text" name="age" value="33"><br>
        <input type="button" value="get 방식" id="btnGet">
        <input type="button" value="post 방식" id="btnPost">
    </form>
</body>
</html>
