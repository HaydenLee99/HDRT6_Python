<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function func1(){
            // let str1 = document.getElementById("test1").innerHTML;
            let str1 = document.querySelector("#test1").innerHTML;      // # : id 선택자
            // console.log(str1);
            document.querySelector("#show1").innerHTML = str1;

            let tag1 = "이름:<input type='text' name='irum'>";
            let tag2 = "나이:<input type='text' name='nai'>";
            document.querySelector("#test1").innerHTML = tag1 + "<br>" + tag2;
        }

        function func2(){
            let str2 = document.querySelector("#test2").innerHTML;      // # : id 선택자
            // console.log(str2);
            document.querySelector("#show2").innerText = str2;
        }
    </script>
</head>
<body>
    <!--
    ** 실행 중 tag의 생성/삭제 & 데이터의 참조/추가/수정/삭제 처리 가능 명령 **<hr>
    elenment.InnerText : element 안의 text 값만 대상으로 처리<br>
    elenment.InnerHTML : element 안의 text 뿐 아니라 HTML or XML을 대상으로 처리<hr>
    innerHTML은 보안상 문제 가능성이 있어 insertAdjacentHTML 사용이 권장
    -->
    <div id="test1"><h2>InnerHTML 연습</h2></div>
    <div id="test2"><h2>반갑습니다</h2></div>
    <input type="button" value="처리1" onclick="func1()"></input>
    <input type="button" value="처리2" onclick="func2()"></input>
    <br>
    <div id="show1">출력 1</div>
    <div id="show2">출력 2</div>


</body>
</html>
